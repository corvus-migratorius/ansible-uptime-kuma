---
name: kics
on:
  pull_request:
    branches: ["master"]

jobs:
  kics:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        name: Check out source code

      - name: run a KICS scan
        uses: checkmarx/kics-github-action@5373b38b35d09a400790b9e560189064d185391f
        with:
          path: .
          token: ${{ secrets.GITHUB_TOKEN }}
          output_path: myResults/
